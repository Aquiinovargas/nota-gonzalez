<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#3b4d6b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Notas González</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--b:#3b4d6b;--bl:#4e6585;--bd:#2c3a52;--g:#c7a94e;--bg:#e4e8ef;--card:#fff;--bdr:#bec8d8;--txt:#1a2535;--txts:#7c8595;--grn:#3a8a5c}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
.header{background:linear-gradient(135deg,var(--bd),var(--bl));padding:12px 14px;display:flex;align-items:center;gap:10px;color:#fff}
.header img{height:46px;border-radius:5px}
.header h1{font-size:16px;letter-spacing:.5px;margin:0}
.header p{font-size:9px;opacity:.9;margin:2px 0 0}
.header small{font-size:8px;opacity:.5}
.gold-bar{background:var(--g);padding:4px 14px;font-size:10px;font-weight:700;color:var(--bd);text-align:center;letter-spacing:1.5px}
.card{background:var(--card);padding:14px 12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px 10px}
.grid2 .full{grid-column:1/-1}
label{font-size:9px;font-weight:700;color:var(--bl);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:2px}
input[type=text],input[type=date],input[type=number]{width:100%;padding:8px;border:1.5px solid var(--bdr);border-radius:5px;font-size:14px;background:#f0f3f8;outline:none;color:var(--txt);font-family:inherit;-webkit-appearance:none}
input:focus{border-color:var(--b);box-shadow:0 0 0 2px rgba(59,77,107,.12)}
.tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
.tbl thead{background:var(--b);color:#fff}
.tbl th{padding:7px 3px;font-size:10px;font-weight:700;border-bottom:2px solid var(--g)}
.tbl td{padding:2px}
.tbl tr:nth-child(even){background:#eef1f7}
.tbl input{border:none;background:transparent;width:100%;padding:7px 4px;font-size:13px;outline:none;font-family:inherit;color:var(--txt)}
.tbl .imp{padding:7px 4px;text-align:right;font-weight:700;color:var(--b);font-family:monospace;font-size:13px}
.rm-btn{background:none;border:none;color:#ccc;font-size:14px;cursor:pointer;padding:4px}
.add-btn{margin-top:5px;padding:7px;background:none;border:1.5px dashed var(--bdr);border-radius:5px;color:var(--bl);cursor:pointer;font-size:11px;width:100%;font-weight:600}
.toggle{display:flex;align-items:center;gap:8px;cursor:pointer;background:#f0f2f6;padding:8px 12px;border-radius:8px;border:2px solid #ccd2dc;user-select:none;-webkit-user-select:none}
.toggle.on{background:#dff0e5;border-color:var(--grn)}
.track{width:40px;height:20px;border-radius:10px;background:#aab2c0;position:relative;flex-shrink:0;transition:background .2s}
.toggle.on .track{background:var(--grn)}
.thumb{width:16px;height:16px;border-radius:8px;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.toggle.on .thumb{left:22px}
.toggle span{font-size:12px;font-weight:700;color:#888}
.toggle.on span{color:#2e7d32}
.totals{margin:12px 0 0 auto;width:100%;max-width:240px;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid var(--bdr)}
.tot-row{display:flex;justify-content:space-between;padding:8px 10px;font-size:13px}
.tot-sub{background:#eef1f7;color:#555}
.tot-iva{background:#e0f2e5;color:#2e7d32;border-top:1px solid var(--bdr)}
.tot-total{background:var(--b);color:#fff;font-weight:800;font-size:16px}
.btns{display:flex;gap:8px;margin-top:16px;justify-content:center}
.btn-clear{padding:10px 14px;background:#fff;border:2px solid #ccd2dc;border-radius:8px;cursor:pointer;font-size:12px;color:#777;font-weight:600}
.btn-gen{padding:12px 24px;background:linear-gradient(135deg,var(--bd),var(--bl));border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:14px;font-weight:700;box-shadow:0 3px 12px rgba(59,77,107,.35);letter-spacing:.3px}
.btn-dl{padding:12px 24px;background:linear-gradient(135deg,#2d6a4f,#40916c);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 3px 12px rgba(58,138,92,.35);min-width:200px}
.btn-dl:disabled{background:#888;cursor:wait}
.btn-edit{padding:12px 16px;background:#fff;color:#333;border:2px solid var(--bdr);border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}
.preview-wrap{background:#c0c7d4;min-height:100vh;padding:10px 6px}
.nota-shadow{box-shadow:0 6px 30px rgba(0,0,0,.18);border-radius:4px;overflow:hidden;max-width:700px;margin:0 auto;background:#fff}
.prev-btns{max-width:700px;margin:12px auto;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.prev-tip{text-align:center;font-size:10px;color:#667;margin-top:4px;padding:0 10px}
.footer-bar{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px;padding-bottom:12px}
.footer-bar img{height:18px;border-radius:2px}
.footer-bar span{font-size:8px;color:var(--bl)}
.flex-wrap{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-top:12px}
.pprod{display:flex;align-items:center;gap:5px}
.pprod label{font-size:10px;white-space:nowrap;margin:0}
.pprod input{width:90px;text-align:right}

/* NOTA PRINT STYLES */
.nota{width:100%;max-width:700px;margin:0 auto;background:#fff;font-family:Helvetica,Arial,sans-serif;color:#222;padding:16px 18px}
.nota .n-header{background:linear-gradient(135deg,var(--bd),var(--bl));padding:10px 12px;display:flex;align-items:center;gap:10px;border-radius:4px}
.nota .n-header img{height:48px;border-radius:4px}
.nota .n-header h2{color:#fff;font-size:16px;letter-spacing:.8px;margin:0}
.nota .n-header p{color:#fff;font-size:9px;opacity:.95;margin:1px 0 0}
.nota .n-gold{background:var(--g);padding:3px 12px;font-size:10px;font-weight:800;color:var(--bd);text-align:center;letter-spacing:1.5px}
.nota .n-info{display:grid;grid-template-columns:1fr 1fr;gap:3px 14px;margin:8px 0;font-size:10px}
.nota .n-info b{color:var(--b)}
.nota .n-tbl-wrap{position:relative}
.nota .n-wm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:.07;pointer-events:none;z-index:0}
.nota .n-wm img{width:250px}
.nota .n-tbl{width:100%;border-collapse:collapse;font-size:9.5px;position:relative;z-index:1}
.nota .n-tbl thead{background:var(--b);color:#fff}
.nota .n-tbl th{padding:4px 3px;font-size:8.5px}
.nota .n-tbl td{padding:3px 4px;border-bottom:1px solid #d5d9e3}
.nota .n-tbl tr:nth-child(even){background:#eef1f7}
.nota .n-foot{display:flex;justify-content:space-between;align-items:flex-end;margin-top:6px}
.nota .n-foot img{height:28px;border-radius:3px}
.nota .n-totals{width:180px}
.nota .n-trow{display:flex;justify-content:space-between;padding:3px 6px;font-size:9.5px}
.nota .n-tsub{background:#e8ecf2;border:1px solid #c0c8d6}
.nota .n-tiva{background:#e8ecf2;border-left:1px solid #c0c8d6;border-right:1px solid #c0c8d6;border-bottom:1px solid #c0c8d6}
.nota .n-ttot{background:var(--b);color:#fff;font-weight:800;font-size:11px}
.nota .n-bar{text-align:center;margin-top:8px;font-size:7.5px;color:#fff;background:var(--b);padding:4px 8px;border-radius:3px}

@media(max-width:500px){
  .grid2{grid-template-columns:1fr}
  .grid2 .full{grid-column:auto}
  .totals{max-width:100%}
}
</style>
</head>

const $=s=>document.querySelector(s);
const ce=(t,p,c)=>{const e=document.createElement(t);if(p)Object.entries(p).forEach(([k,v])=>{if(k==='class')e.className=v;else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='html')e.innerHTML=v;else if(k==='text')e.textContent=v;else e.setAttribute(k,v)});if(c){if(Array.isArray(c))c.forEach(ch=>{if(ch)e.appendChild(typeof ch==='string'?document.createTextNode(ch):ch)});else if(typeof c==='string')e.textContent=c;else e.appendChild(c)}return e};

const fmt=v=>{const x=parseFloat(v);return isNaN(x)?'0.00':x.toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2})};
const nm=v=>{const x=parseFloat(v);return isNaN(x)?0:x};

let state={
  orden:'',fecha:new Date().toISOString().slice(0,10),unidad:'',cliente:'',dir:'',tel:'',rfc:'',
  items:Array.from({length:6},()=>({cant:'',desc:'',precio:'',importe:''})),
  pprod:'',conIva:false,view:'form'
};

function getSub(){return state.items.reduce((s,r)=>s+nm(r.importe),0)+nm(state.pprod)}
function getIva(){return state.conIva?getSub()*0.16:0}
function getTot(){return getSub()+getIva()}

function render(){
  const app=$('#app');
  app.innerHTML='';
  if(state.view==='form')renderForm(app);
  else renderPreview(app);
}

function renderForm(app){
  // Header
  const hdr=ce('div',{class:'header'},[
    ce('img',{src:LH}),
    ce('div',{},[
      ce('h1',{text:'TALLER AUTOMOTRÍZ'}),
      ce('p',{text:'Transmisiones Automáticas y Mecánica en General González'}),
      ce('small',{text:'CEL: 756 113 69 23 · Col. El Progreso, Calle Santo Domingo'})
    ])
  ]);
  app.appendChild(hdr);
  app.appendChild(ce('div',{class:'gold-bar',text:'NOTA DE REMISIÓN'}));

  const card=ce('div',{class:'card'});

  // Fields
  const fields=[
    {l:'No. de Orden',k:'orden',p:'Ej: 001'},
    {l:'Fecha',k:'fecha',t:'date'},
    {l:'Unidad (Vehículo)',k:'unidad',p:'Marca / Modelo / Año'},
    {l:'Dirección',k:'dir',p:'Dirección del cliente'},
    {l:'Cliente',k:'cliente',p:'Nombre completo'},
    {l:'Teléfono',k:'tel',p:'Teléfono'},
    {l:'R.F.C.',k:'rfc',p:'RFC (opcional)',full:true}
  ];
  const grid=ce('div',{class:'grid2'});
  fields.forEach(f=>{
    const d=ce('div',{class:f.full?'full':''});
    d.appendChild(ce('label',{text:f.l}));
    const inp=ce('input',{type:f.t||'text',value:state[f.k],placeholder:f.p||''});
    inp.addEventListener('input',e=>{state[f.k]=e.target.value});
    d.appendChild(inp);
    grid.appendChild(d);
  });
  card.appendChild(grid);

  // Table
  const tbl=ce('table',{class:'tbl'});
  const thead=ce('thead');
  const hr=ce('tr');
  ['CANT.','DESCRIPCIÓN','PRECIO','IMPORTE',''].forEach((h,i)=>{
    const th=ce('th',{text:h});
    if(i===0)th.style.width='42px';
    else if(i===2||i===3)th.style.width='75px';
    else if(i===4)th.style.width='24px';
    if(i<2)th.style.textAlign='left';
    hr.appendChild(th);
  });
  thead.appendChild(hr);
  tbl.appendChild(thead);

  const tbody=ce('tbody');
  state.items.forEach((r,i)=>{
    const tr=ce('tr');
    // cant
    const ci=ce('input',{type:'text',value:r.cant,placeholder:'0',style:'text-align:center'});
    ci.addEventListener('input',e=>{r.cant=e.target.value;const c=nm(r.cant),p=nm(r.precio);r.importe=c&&p?(c*p).toFixed(2):'';render()});
    tr.appendChild(ce('td',{},[ci]));
    // desc
    const di=ce('input',{type:'text',value:r.desc,placeholder:'Servicio o refacción...'});
    di.addEventListener('input',e=>{r.desc=e.target.value});
    tr.appendChild(ce('td',{},[di]));
    // precio
    const pi=ce('input',{type:'text',value:r.precio,placeholder:'0.00',style:'text-align:right'});
    pi.addEventListener('input',e=>{r.precio=e.target.value;const c=nm(r.cant),p=nm(r.precio);r.importe=c&&p?(c*p).toFixed(2):'';render()});
    tr.appendChild(ce('td',{},[pi]));
    // importe
    tr.appendChild(ce('td',{class:'imp',text:r.importe?'$ '+fmt(r.importe):''}));
    // remove
    const rb=ce('button',{class:'rm-btn',text:'✕',onClick:()=>{if(state.items.length>1){state.items.splice(i,1);render()}}});
    tr.appendChild(ce('td',{style:'text-align:center'},[rb]));
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  card.appendChild(tbl);

  // Add row
  const ab=ce('button',{class:'add-btn',text:'+ Agregar fila',onClick:()=>{state.items.push({cant:'',desc:'',precio:'',importe:''});render()}});
  card.appendChild(ab);

  // IVA + Product price row
  const fw=ce('div',{class:'flex-wrap'});

  const tog=ce('div',{class:'toggle'+(state.conIva?' on':''),onClick:()=>{state.conIva=!state.conIva;render()}});
  const track=ce('div',{class:'track'},[ce('div',{class:'thumb'})]);
  tog.appendChild(track);
  tog.appendChild(ce('span',{text:state.conIva?'✓ Con I.V.A. (16%)':'Sin I.V.A.'}));
  fw.appendChild(tog);

  const ppd=ce('div',{class:'pprod'});
  ppd.appendChild(ce('label',{text:'Precio Producto:'}));
  const ppi=ce('input',{type:'text',value:state.pprod,placeholder:'0.00'});
  ppi.addEventListener('input',e=>{state.pprod=e.target.value;render()});
  ppd.appendChild(ppi);
  fw.appendChild(ppd);
  card.appendChild(fw);

  // Totals
  const tots=ce('div',{class:'totals'});
  tots.appendChild(ce('div',{class:'tot-row tot-sub',html:'<span style="font-weight:700">Subtotal:</span><span style="font-family:monospace;font-weight:600">$ '+fmt(getSub())+'</span>'}));
  if(state.conIva)tots.appendChild(ce('div',{class:'tot-row tot-iva',html:'<span style="font-weight:700">I.V.A. (16%):</span><span style="font-family:monospace;font-weight:600">$ '+fmt(getIva())+'</span>'}));
  tots.appendChild(ce('div',{class:'tot-row tot-total',html:'<span>TOTAL:</span><span style="font-family:monospace">$ '+fmt(getTot())+'</span>'}));
  card.appendChild(tots);

  // Buttons
  const btns=ce('div',{class:'btns'});
  btns.appendChild(ce('button',{class:'btn-clear',text:'🗑 Limpiar',onClick:()=>{
    state={orden:'',fecha:new Date().toISOString().slice(0,10),unidad:'',cliente:'',dir:'',tel:'',rfc:'',
    items:Array.from({length:6},()=>({cant:'',desc:'',precio:'',importe:''})),pprod:'',conIva:false,view:'form'};render()
  }}));
  btns.appendChild(ce('button',{class:'btn-gen',text:'📄 Generar Nota',onClick:()=>{state.view='preview';render()}}));
  card.appendChild(btns);
  app.appendChild(card);

  // Footer
  const ft=ce('div',{class:'footer-bar'});
  ft.appendChild(ce('img',{src:LF}));
  ft.appendChild(ce('span',{text:'González · Transmisiones Automáticas y Mecánica en General'}));
  app.appendChild(ft);
}

function renderPreview(app){
  const wrap=ce('div',{class:'preview-wrap'});
  const shadow=ce('div',{class:'nota-shadow'});

  // Build nota
  const nota=ce('div',{class:'nota',id:'nota-capture'});

  // Header
  nota.appendChild(ce('div',{class:'n-header'},[
    ce('img',{src:LH}),
    ce('div',{},[
      ce('h2',{text:'TALLER AUTOMOTRÍZ'}),
      ce('p',{text:'TRANSMISIONES AUTOMÁTICAS'}),
      ce('p',{text:'Y MECÁNICA EN GENERAL GONZÁLEZ'})
    ])
  ]));
  nota.appendChild(ce('div',{class:'n-gold',text:'NOTA DE REMISIÓN'}));

  // Info
  const fd=new Date(state.fecha+'T12:00:00');
  const info=ce('div',{class:'n-info'});
  const infoData=[
    ['No. de Orden:',state.orden||'________'],
    ['Fecha:','Día: '+fd.getDate()+' Mes: '+fd.toLocaleString('es-MX',{month:'long'})+' Año: '+fd.getFullYear()],
    ['Unidad:',state.unidad||'________'],['Dirección:',state.dir||'________'],
    ['Cliente:',state.cliente||'________'],['Teléfono:',state.tel||'________']
  ];
  infoData.forEach(([l,v])=>{info.appendChild(ce('div',{html:'<b>'+l+'</b> '+v}))});
  info.appendChild(ce('div',{html:'<b>R.F.C.:</b> '+(state.rfc||'________'),style:'grid-column:1/-1'}));
  nota.appendChild(info);

  // Table with watermark
  const tw=ce('div',{class:'n-tbl-wrap'});
  tw.appendChild(ce('div',{class:'n-wm'},[ce('img',{src:LW})]));

  const tbl=ce('table',{class:'n-tbl'});
  const th=ce('thead');
  const thr=ce('tr');
  ['CANTIDAD','DESCRIPCIÓN','PRECIO','IMPORTE (MXN)'].forEach((h,i)=>{
    const t=ce('th',{text:h});
    if(i===0)t.style.width='50px';
    else if(i===2)t.style.width='68px';
    else if(i===3)t.style.width='82px';
    thr.appendChild(t);
  });
  th.appendChild(thr);
  tbl.appendChild(th);

  const tb=ce('tbody');
  const pIts=[...state.items];
  while(pIts.length<16)pIts.push({cant:'',desc:'',precio:'',importe:''});
  pIts.forEach(r=>{
    const tr=ce('tr');
    tr.appendChild(ce('td',{text:r.cant,style:'text-align:center;border-left:1px solid #d5d9e3'}));
    tr.appendChild(ce('td',{text:r.desc}));
    tr.appendChild(ce('td',{text:r.precio?'$ '+fmt(r.precio):'$',style:'text-align:right;border-left:1px solid #d5d9e3'}));
    tr.appendChild(ce('td',{text:r.importe?'$ '+fmt(r.importe):'$',style:'text-align:right;border-left:1px solid #d5d9e3;border-right:1px solid #d5d9e3'}));
    tb.appendChild(tr);
  });
  // Precio producto row
  const ppr=ce('tr');
  ppr.appendChild(ce('td',{html:'<i>Precio del Producto</i>',colspan:'3',style:'text-align:right;border-bottom:1px solid #aaa'}));
  ppr.appendChild(ce('td',{text:nm(state.pprod)>0?'$ '+fmt(state.pprod):'$',style:'text-align:right;border-bottom:1px solid #aaa;border-left:1px solid #d5d9e3;border-right:1px solid #d5d9e3'}));
  tb.appendChild(ppr);
  tbl.appendChild(tb);
  tw.appendChild(tbl);
  nota.appendChild(tw);

  // Footer with totals
  const nf=ce('div',{class:'n-foot'});
  nf.appendChild(ce('img',{src:LF}));
  const nt=ce('div',{class:'n-totals'});
  nt.appendChild(ce('div',{class:'n-trow n-tsub',html:'<b>Subtotal:</b><span>$ '+fmt(getSub())+'</span>'}));
  if(state.conIva)nt.appendChild(ce('div',{class:'n-trow n-tiva',html:'<b>I.V.A. (16%):</b><span>$ '+fmt(getIva())+'</span>'}));
  nt.appendChild(ce('div',{class:'n-trow n-ttot',html:'<span>TOTAL:</span><span>$ '+fmt(getTot())+'</span>'}));
  nf.appendChild(nt);
  nota.appendChild(nf);

  nota.appendChild(ce('div',{class:'n-bar',html:'<b>CEL.: 756 113 69 23</b> · DIRECCIÓN: Colonia El Progreso, Calle Santo Domingo'}));

  shadow.appendChild(nota);
  wrap.appendChild(shadow);

  // Buttons
  const btns=ce('div',{class:'prev-btns'});
  const dlBtn=ce('button',{class:'btn-dl',text:'📥 Descargar Nota (imagen HD)',onClick:async()=>{
    dlBtn.disabled=true;dlBtn.textContent='⏳ Generando...';
    try{
      const c=await html2canvas(document.getElementById('nota-capture'),{scale:3,useCORS:true,backgroundColor:'#fff'});
      const a=document.createElement('a');
      a.download='Nota_'+(state.orden||'remision')+'_'+state.fecha+'.png';
      a.href=c.toDataURL('image/png');
      document.body.appendChild(a);a.click();document.body.removeChild(a);
    }catch(e){alert('Error: '+e.message)}
    dlBtn.disabled=false;dlBtn.textContent='📥 Descargar Nota (imagen HD)';
  }});
  btns.appendChild(dlBtn);
  btns.appendChild(ce('button',{class:'btn-edit',text:'✏️ Editar',onClick:()=>{state.view='form';render()}}));
  wrap.appendChild(btns);
  wrap.appendChild(ce('p',{class:'prev-tip',text:'💡 La imagen se guarda en tu galería. Envíala por WhatsApp o correo a tus clientes.'}));
  app.appendChild(wrap);
}

// Init
render();

// Register service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
