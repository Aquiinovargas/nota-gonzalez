```html
<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nota de Remisión - Taller González</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">

<meta name="theme-color" content="#3b4d6b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="apple-touch-icon" href="./Logo.jpeg">

<!-- Librería -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#f2f2f2;
  padding:20px;
}

.container{
  max-width:800px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,.1);
}

.logo{
  text-align:center;
  margin-bottom:20px;
}

.logo img{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

h1{
  text-align:center;
  margin-bottom:20px;
  color:#2c3a52;
}

.form-group{
  margin-bottom:15px;
}

label{
  display:block;
  margin-bottom:5px;
  font-weight:bold;
}

input,
textarea{
  width:100%;
  padding:12px;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:16px;
}

textarea{
  resize:vertical;
  min-height:100px;
}

button{
  width:100%;
  padding:15px;
  background:#3b4d6b;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  margin-top:10px;
}

button:hover{
  background:#2c3a52;
}

#nota{
  margin-top:30px;
  border:2px solid #ccc;
  padding:20px;
  border-radius:10px;
  background:white;
}

.hidden{
  display:none;
}

.nota-header{
  text-align:center;
  margin-bottom:20px;
}

.nota-header img{
  width:100px;
  margin-bottom:10px;
}

.nota-line{
  margin-bottom:10px;
}

.total{
  font-size:22px;
  margin-top:20px;
  color:#2c3a52;
}

.footer{
  margin-top:30px;
  text-align:center;
  font-size:14px;
  color:#666;
}

</style>

</head>
<body>

<div class="container">

  <div class="logo">
    <img src="./Logo.jpeg" alt="Logo">
  </div>

  <h1>Nota de Remisión</h1>

  <div class="form-group">
    <label>Cliente</label>
    <input type="text" id="cliente">
  </div>

  <div class="form-group">
    <label>Vehículo</label>
    <input type="text" id="vehiculo">
  </div>

  <div class="form-group">
    <label>Servicio</label>
    <textarea id="servicio"></textarea>
  </div>

  <div class="form-group">
    <label>Total</label>
    <input type="number" id="total">
  </div>

  <button onclick="generarNota()">
    Generar Nota
  </button>

  <button onclick="descargarNota()">
    Descargar Nota
  </button>

  <!-- NOTA -->

  <div id="nota" class="hidden">

    <div class="nota-header">

      <img src="./Logo.jpeg" alt="Logo">

      <h2>Taller González</h2>

      <p>
        Sistema de Notas de Remisión
      </p>

    </div>

    <div class="nota-line">
      <strong>Cliente:</strong>
      <span id="vCliente"></span>
    </div>

    <div class="nota-line">
      <strong>Vehículo:</strong>
      <span id="vVehiculo"></span>
    </div>

    <div class="nota-line">
      <strong>Servicio:</strong>
      <p id="vServicio"></p>
    </div>

    <div class="total">
      Total: $
      <span id="vTotal"></span>
    </div>

    <div class="footer">
      Gracias por su preferencia
    </div>

  </div>

</div>

<script>

function generarNota(){

  document.getElementById('vCliente').innerText =
    document.getElementById('cliente').value;

  document.getElementById('vVehiculo').innerText =
    document.getElementById('vehiculo').value;

  document.getElementById('vServicio').innerText =
    document.getElementById('servicio').value;

  document.getElementById('vTotal').innerText =
    document.getElementById('total').value;

  document.getElementById('nota').classList.remove('hidden');
}

function descargarNota(){

  html2canvas(document.getElementById('nota'))
    .then(canvas => {

      const link = document.createElement('a');

      link.download = 'nota-remision.png';

      link.href = canvas.toDataURL();

      link.click();

    });
}

/* PWA */

if ('serviceWorker' in navigator) {

  window.addEventListener('load', () => {

    navigator.serviceWorker
      .register('./sw.js')
      .then(() => console.log('SW registrado'))
      .catch(err => console.log(err));

  });

}

</script>

</body>
</html>
```
