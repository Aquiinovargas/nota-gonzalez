<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notas González</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">

<meta name="theme-color" content="#3b4d6b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="apple-touch-icon" href="./Logo.jpeg">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f2f2f2;
  padding:20px;
}

.container{
  max-width:1200px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,.1);
}

.logo{
  text-align:center;
  margin-bottom:15px;
}

.logo img{
  width:130px;
  height:130px;
  object-fit:cover;
  border-radius:12px;
}

h1{
  text-align:center;
  color:#2c3a52;
  margin-bottom:25px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.form-group{
  display:flex;
  flex-direction:column;
}

label{
  margin-bottom:5px;
  font-weight:bold;
}

input{
  padding:12px;
  border:1px solid #ccc;
  border-radius:8px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

table th{
  background:#3b4d6b;
  color:white;
  padding:12px;
}

table td{
  border:1px solid #ccc;
  padding:8px;
}

table input{
  width:100%;
  border:none;
  outline:none;
}

.btn{
  padding:12px 18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:15px;
  font-size:15px;
}

.add{
  background:#28a745;
  color:white;
}

.clear{
  background:#dc3545;
  color:white;
}

.generate{
  background:#3b4d6b;
  color:white;
}

.delete-btn{
  background:#dc3545;
  color:white;
  border:none;
  padding:8px 10px;
  border-radius:6px;
  cursor:pointer;
}

.totales{
  margin-top:25px;
  padding:20px;
  background:#f8f8f8;
  border-radius:10px;
  text-align:right;
  line-height:2;
  font-size:18px;
}

.totales h2{
  color:#2c3a52;
  margin-top:10px;
}

.footer{
  margin-top:35px;
  text-align:center;
  color:#555;
  font-weight:bold;
  font-size:15px;
}

</style>

</head>
<body>

<div class="container" id="nota">

  <div class="logo">
    <img src="./Logo.jpeg" alt="Logo">
  </div>

  <h1>Nota de Remisión</h1>

  <div class="grid">

    <div class="form-group">
      <label>No. de Orden</label>
      <input type="text" placeholder="Ej: 001">
    </div>

    <div class="form-group">
      <label>Fecha</label>
      <input type="date">
    </div>

    <div class="form-group">
      <label>Unidad (Vehículo)</label>
      <input type="text" placeholder="Marca / Modelo / Año">
    </div>

    <div class="form-group">
      <label>Dirección</label>
      <input type="text" placeholder="Dirección del cliente">
    </div>

    <div class="form-group">
      <label>Cliente</label>
      <input type="text" placeholder="Nombre completo">
    </div>

    <div class="form-group">
      <label>Teléfono</label>
      <input type="text" placeholder="Teléfono">
    </div>

    <div class="form-group">
      <label>R.F.C.</label>
      <input type="text" placeholder="RFC (opcional)">
    </div>

  </div>

  <!-- TABLA -->

  <table>

    <thead>

      <tr>
        <th>CANT.</th>
        <th>DESCRIPCIÓN</th>
        <th>PRECIO</th>
        <th>IMPORTE</th>
        <th></th>
      </tr>

    </thead>

    <tbody id="bodyTable">

      <tr>

        <td>
          <input type="number" value="0" class="cantidad">
        </td>

        <td>
          <input type="text" placeholder="Servicio o refacción..." class="descripcion">
        </td>

        <td>
          <input type="number" value="0" class="precio">
        </td>

        <td class="importe">
          $0.00
        </td>

        <td>
          <button class="delete-btn" onclick="eliminarFila(this)">
            ✕
          </button>
        </td>

      </tr>

    </tbody>

  </table>

  <button class="btn add" onclick="agregarFila()">
    + Agregar fila
  </button>

  <!-- TOTALES -->

  <div class="totales">

    <p>
      Precio Producto:
      $ <span id="precioProducto">0.00</span>
    </p>

    <p>
      Subtotal:
      $ <span id="subtotal">0.00</span>
    </p>

    <p>
      IVA (16%):
      $ <span id="iva">0.00</span>
    </p>

    <p>
      ISR (10%):
      $ <span id="isr">0.00</span>
    </p>

    <h2>
      TOTAL:
      $ <span id="total">0.00</span>
    </h2>

  </div>

  <!-- BOTONES -->

  <button class="btn clear" onclick="limpiarTodo()">
    🗑 Limpiar
  </button>

  <button class="btn generate" onclick="generarNota()">
    📄 Generar Nota
  </button>

  <div class="footer">
    González · Transmisiones Automáticas y Mecánica en General
  </div>

</div>

<script>

function agregarFila(){

  const tr = document.createElement('tr');

  tr.innerHTML = `
    <td>
      <input type="number" value="0" class="cantidad">
    </td>

    <td>
      <input type="text" placeholder="Servicio o refacción..." class="descripcion">
    </td>

    <td>
      <input type="number" value="0" class="precio">
    </td>

    <td class="importe">
      $0.00
    </td>

    <td>
      <button class="delete-btn" onclick="eliminarFila(this)">
        ✕
      </button>
    </td>
  `;

  document.getElementById('bodyTable').appendChild(tr);

  eventos();
}

function eliminarFila(btn){

  btn.parentElement.parentElement.remove();

  calcular();
}

function eventos(){

  document.querySelectorAll('.cantidad,.precio').forEach(input=>{

    input.oninput = calcular;

  });

}

function calcular(){

  let subtotal = 0;

  document.querySelectorAll('#bodyTable tr').forEach(row=>{

    const cantidad =
      parseFloat(row.querySelector('.cantidad').value) || 0;

    const precio =
      parseFloat(row.querySelector('.precio').value) || 0;

    const importe = cantidad * precio;

    row.querySelector('.importe').innerText =
      '$' + importe.toFixed(2);

    subtotal += importe;

  });

  const iva = subtotal * 0.16;

  const isr = subtotal * 0.10;

  const total = subtotal + iva - isr;

  document.getElementById('precioProducto').innerText =
    subtotal.toFixed(2);

  document.getElementById('subtotal').innerText =
    subtotal.toFixed(2);

  document.getElementById('iva').innerText =
    iva.toFixed(2);

  document.getElementById('isr').innerText =
    isr.toFixed(2);

  document.getElementById('total').innerText =
    total.toFixed(2);
}

function limpiarTodo(){

  location.reload();
}

function generarNota(){

  html2canvas(document.getElementById('nota'))
    .then(canvas=>{

      const link = document.createElement('a');

      link.download = 'nota-remision.png';

      link.href = canvas.toDataURL();

      link.click();

    });
}

eventos();

/* PWA */

if ('serviceWorker' in navigator){

  window.addEventListener('load',()=>{

    navigator.serviceWorker.register('./sw.js')
      .then(()=>console.log('SW registrado'))
      .catch(err=>console.log(err));

  });

}

</script>

</body>
</html>
