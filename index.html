```html
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Notas González</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#3b4d6b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Notas González">

  <!-- Icono -->
  <link rel="apple-touch-icon" href="./Logo.jpeg">

  <!-- Librería -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f2f4f8;
      padding:20px;
      color:#222;
    }

    .container{
      max-width:700px;
      margin:auto;
      background:#fff;
      padding:25px;
      border-radius:15px;
      box-shadow:0 5px 20px rgba(0,0,0,.1);
    }

    .logo{
      text-align:center;
      margin-bottom:20px;
    }

    .logo img{
      width:120px;
      border-radius:12px;
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      color:#2c3a52;
    }

    .form-group{
      margin-bottom:15px;
    }

    label{
      display:block;
      margin-bottom:5px;
      font-weight:bold;
    }

    input, textarea{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:16px;
    }

    textarea{
      resize:vertical;
      min-height:100px;
    }

    button{
      width:100%;
      padding:15px;
      background:#3b4d6b;
      color:#fff;
      border:none;
      border-radius:10px;
      font-size:16px;
      cursor:pointer;
      margin-top:10px;
    }

    button:hover{
      background:#2c3a52;
    }

    #nota{
      margin-top:30px;
      padding:20px;
      border:2px dashed #999;
      border-radius:10px;
      background:#fff;
    }

    .hidden{
      display:none;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="logo">
      <img src="./Logo.jpeg" alt="Logo">
    </div>

    <h1>Nota de Remisión</h1>

    <div class="form-group">
      <label>Cliente</label>
      <input type="text" id="cliente" placeholder="Nombre del cliente">
    </div>

    <div class="form-group">
      <label>Vehículo</label>
      <input type="text" id="vehiculo" placeholder="Modelo del vehículo">
    </div>

    <div class="form-group">
      <label>Servicio</label>
      <textarea id="servicio" placeholder="Describe el servicio"></textarea>
    </div>

    <div class="form-group">
      <label>Total</label>
      <input type="number" id="total" placeholder="$0.00">
    </div>

    <button onclick="generarNota()">Generar Nota</button>

    <button onclick="descargarNota()">Descargar Imagen</button>

    <div id="nota" class="hidden">
      <h2>Taller González</h2>
      <hr><br>

      <p><strong>Cliente:</strong> <span id="vCliente"></span></p>
      <p><strong>Vehículo:</strong> <span id="vVehiculo"></span></p>
      <p><strong>Servicio:</strong></p>
      <p id="vServicio"></p>

      <br>

      <h3>Total: $<span id="vTotal"></span></h3>

      <br>
      <p>Gracias por su preferencia.</p>
    </div>

  </div>

  <script>
    function generarNota(){

      document.getElementById('vCliente').innerText =
        document.getElementById('cliente').value;

      document.getElementById('vVehiculo').innerText =
        document.getElementById('vehiculo').value;

      document.getElementById('vServicio').innerText =
        document.getElementById('servicio').value;

      document.getElementById('vTotal').innerText =
        document.getElementById('total').value;

      document.getElementById('nota').classList.remove('hidden');
    }

    function descargarNota(){

      const nota = document.getElementById('nota');

      html2canvas(nota).then(canvas => {

        const link = document.createElement('a');

        link.download = 'nota-remision.png';

        link.href = canvas.toDataURL();

        link.click();
      });
    }

    // Registrar Service Worker
    if ('serviceWorker' in navigator) {

      window.addEventListener('load', () => {

        navigator.serviceWorker
          .register('./sw.js')
          .then(() => console.log('Service Worker registrado'))
          .catch(err => console.log('Error:', err));

      });
    }
  </script>

</body>
</html>
```
